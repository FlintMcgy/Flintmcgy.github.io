<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      color: rgb(0, 0, 0);
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh; /* Ensure the body takes at least the full viewport height */
    }
    
    header {
      background-color: #1f2224;
      height: 80px; /* Reduced height for smaller screens */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    header h1 {
      color: rgb(255, 255, 255);
      font-size: 2rem; /* Adjusted font size for smaller screens */
    }
    
    nav {
      background-color: #141414;
      padding: 1rem;
    }
    
    nav ul {
      list-style-type: none;
      display: flex;
      flex-wrap: wrap; /* Allow navigation items to wrap on smaller screens */
      justify-content: center;
    }
    
    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
    }
    
    nav ul li a:hover {
      background-color: #226699;
    }
    
    main {
      padding: 1rem; /* Adjusted padding for smaller screens */
      flex: 1; /* Allow the main section to grow to fill the remaining space */
    }
    
    main section {
      margin-bottom: 1rem; /* Adjusted margin for smaller screens */
    }
    
    main h2 {
      color: #333;
      font-size: 1.5rem;
      font-weight: bold; /* Bold font weight */
      margin-bottom: 10px;
    }
    
    footer {
      background-color: #141414;
      padding: 1rem;
      text-align: center;
      color: rgb(255, 255, 255);
      margin-top: auto; /* Push the footer to the bottom */
    }
    
    /* Password Protection */
    #family-section {
      display: none;
    }
    
    #password-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }
    
    #password-modal-container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    #password-modal input {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      width: 80%; /* Adjust the width as needed */
    }
    
    #password-modal button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 5px;
    }
    
    #password-modal button:hover {
      background-color: #2980b9;
    }
    
    /* Links Section Styles */
    .links-section {
      background-color: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .links-list {
      list-style: none;
      padding: 0;
    }
    
    .link-item {
      margin-bottom: 10px;
      cursor: pointer; /* Make the entire list item clickable */
    }
    
    .link-title {
      color: #333;
      font-size: 1.5rem;
      font-weight: bold; /* Bold font weight */
      margin-bottom: 5px;
    }
    
    .link-url {
      color: #3498db;
      text-decoration: none;
      font-size: 1rem;
    }
    
    .link-url:hover {
      text-decoration: underline;
    }
    
    /* Styling for individual links */
    .link-container {
      background-color: #fff;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }  
  </style>
  <title>Links</title>
</head>
<body>
  <header>
    <h1>LINKS</h1>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Hobbies</a></li>
      <li><a href="Schedule.html">Schedule</a></li>
      <li><a href="Link.html">Links</a></li>
      <li><a href="#">About Me</a></li>
    </ul>
  </nav>

  <main>
    <!-- Password-protected Family Section -->
    <section id="family-section" class="links-section">
      <h2>Password-Protected Section</h2>
      <div id="password-modal" onclick="hidePasswordModal()">
        <div id="password-modal-container">
          <input type="password" id="family-password-input" placeholder="Enter password">
          <button onclick="checkFamilyPassword()">Enter</button>
        </div>
      </div>
    </section>

    <!-- Links Section -->
    <section class="links-section">
      <!-- Link Section 1: Lethal Company -->
      <div class="link-container" onclick="openLink('https://www.mediafire.com/file/oc12fvcmw3c9uu4/Lethal+Company.zip/file')">
        <div class="link-title">Lethal Company</div>
        <div class="link-url">https://www.mediafire.com/file/oc12fvcmw3c9uu4/Lethal+Company.zip/file</div>
      </div>

      <!-- Link Section 2: Family and Friends (Password-Protected) -->
      <div class="link-container" onclick="showPasswordModal()">
        <div class="link-title">Family and Friends</div>
        <div class="link-url">
          <input type="password" id="link-password-input" placeholder="Enter password">
          <button onclick="checkLinkPassword()">Enter</button>
        </div>
      </div>
      <!-- Add more link sections here -->
    </section>
  </main>

  <footer>
    <p>Flint &copy; 2024</p>
  </footer>

  <script>
    // Password Protection Functions
    function showPasswordModal() {
      document.getElementById('password-modal').style.display = 'flex';
    }

    function hidePasswordModal() {
      document.getElementById('password-modal').style.display = 'none';
    }

    function checkFamilyPassword() {
      const familyPasswordInput = document.getElementById('family-password-input');
      const password = 'family123'; // Change this to your actual password
      if (familyPasswordInput.value === password) {
        document.getElementById('family-section').style.display = 'block';
      } else {
        alert('Incorrect password. Please try again.');
      }
      // Reset entered password
      familyPasswordInput.value = '';
    }

    function checkLinkPassword() {
      const linkPasswordInput = document.getElementById('link-password-input');
      const password = '123'; // Change this to your actual password
      if (linkPasswordInput.value === password) {
        alert('Password correct! You can now access the link.');
      } else {
        alert('Incorrect password. Please try again.');
      }
      // Reset entered password
      linkPasswordInput.value = '';
    }

    // Function to open links in a new tab
    function openLink(url) {
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
